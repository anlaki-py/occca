name: Auto Release

on:
  push:
    branches:
      - master

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm ci

      - name: Run tests
        run: npm test

  build:
    needs: test
    runs-on: ubuntu-latest
    strategy:
      matrix:
        target:
          - { name: win-x64, bun-target: bun-windows-x64, artifact: occca-win-x64.exe }
          - { name: win-arm64, bun-target: bun-windows-arm64, artifact: occca-win-arm64.exe }
          - { name: linux-x64, bun-target: bun-linux-x64, artifact: occca-linux-x64 }
          - { name: linux-arm64, bun-target: bun-linux-arm64, artifact: occca-linux-arm64 }
    steps:
      - uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v1

      - name: Install dependencies
        run: bun install

      - name: Build binary
        run: bun build src/entrypoints/cli.ts --compile --target=${{ matrix.target.bun-target }} --outfile dist/bin/${{ matrix.target.artifact }}

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.target.artifact }}
          path: dist/bin/${{ matrix.target.artifact }}

  release:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Get timestamp
        id: timestamp
        run: echo "tag=$(date +'%Y-%m-%d_%H-%M-%S')" >> $GITHUB_OUTPUT

      - name: Determine next version
        id: version
        run: |
          LATEST_TAG=$(git tag -l 'v*' --sort=-version:refname | head -n 1)

          if [ -z "$LATEST_TAG" ]; then
            NEXT_VERSION="v0.0.1"
          else
            VERSION=${LATEST_TAG#v}
            MAJOR=$(echo "$VERSION" | cut -d. -f1)
            MINOR=$(echo "$VERSION" | cut -d. -f2)
            PATCH=$(echo "$VERSION" | cut -d. -f3)

            MAJOR=${MAJOR:-0}
            MINOR=${MINOR:-0}
            PATCH=${PATCH:-0}

            if [ "$PATCH" -ge 99 ]; then
              PATCH=0
              if [ "$MINOR" -ge 99 ]; then
                MINOR=0
                MAJOR=$((MAJOR + 1))
              else
                MINOR=$((MINOR + 1))
              fi
            else
              PATCH=$((PATCH + 1))
            fi

            NEXT_VERSION="v${MAJOR}.${MINOR}.${PATCH}"
          fi

          echo "version=$NEXT_VERSION" >> $GITHUB_OUTPUT

      - name: Prepare release assets
        run: |
          mkdir -p release-assets
          mv artifacts/occca-win-x64.exe/occca-win-x64.exe release-assets/occca-win-x64.exe
          mv artifacts/occca-win-arm64.exe/occca-win-arm64.exe release-assets/occca-win-arm64.exe
          mv artifacts/occca-linux-x64/occca-linux-x64 release-assets/occca-linux-x64
          mv artifacts/occca-linux-arm64/occca-linux-arm64 release-assets/occca-linux-arm64

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.version }}
          name: "Release ${{ steps.version.outputs.version }} (${{ steps.timestamp.outputs.tag }})"
          generate_release_notes: true
          files: |
            release-assets/occca-win-x64.exe
            release-assets/occca-win-arm64.exe
            release-assets/occca-linux-x64
            release-assets/occca-linux-arm64
